<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g" x1="10" y1="5" x2="90" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04d9d9"/>
      <stop offset="100%" stop-color="#a4f63f"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="50,4 88,26 88,74 50,96 12,74 12,26"
    stroke="url(#g)" stroke-width="5" stroke-linejoin="round"/>

  <!-- Circuit A — left leg with angular bend at foot -->
  <path d="M27,82 L27,70 L44,36 L50,24"
    stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Circuit A — right leg -->
  <path d="M50,24 L56,36 L56,54"
    stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crossbar -->
  <line x1="33" y1="63" x2="56" y2="63"
    stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="27" cy="82" r="4" fill="#04d9d9"/>
  <circle cx="56" cy="63" r="4" fill="#a4f63f"/>

  <!-- Inner circuit O (right side) — smaller inner hex loop -->
  <polygon points="66,30 78,38 78,57 66,65 54,57 54,38"
    stroke="url(#g)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Node on right of inner hex -->
  <circle cx="78" cy="47" r="4" fill="#a4f63f"/>
</svg>
